version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lineforge
      POSTGRES_USER: lineforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lineforge}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lineforge -d lineforge']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lineforge:lineforge@postgres:5432/lineforge}
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      DB_HOST: postgres
      DB_USER: lineforge
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '5173:5173'
    environment:
      API_URL: http://api:4000
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src

volumes:
  postgres_data:
