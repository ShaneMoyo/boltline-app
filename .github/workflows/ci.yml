name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://boltline:boltline@localhost:5432/boltline
  TEST_DATABASE_URL: postgresql://boltline:boltline@localhost:5433/boltline_test

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @boltline/api db:generate

      - name: Typecheck all workspaces
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @boltline/api db:generate

      - name: Run unit tests
        run: pnpm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: boltline_test
          POSTGRES_USER: boltline
          POSTGRES_PASSWORD: boltline
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @boltline/api db:generate

      - name: Run migrations on test DB
        run: pnpm --filter @boltline/api db:migrate
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start full stack
        run: docker-compose up -d
        timeout-minutes: 5

      - name: Wait for web service
        run: |
          echo "Waiting for web service to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 2; done'

      - name: Run E2E tests
        run: pnpm e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
