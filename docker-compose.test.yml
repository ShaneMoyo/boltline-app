version: '3.9'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lineforge_test
      POSTGRES_USER: lineforge
      POSTGRES_PASSWORD: lineforge
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lineforge -d lineforge_test']
      interval: 5s
      timeout: 5s
      retries: 10
