version: '3.9'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boltline_test
      POSTGRES_USER: boltline
      POSTGRES_PASSWORD: boltline
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boltline -d boltline_test']
      interval: 5s
      timeout: 5s
      retries: 10
